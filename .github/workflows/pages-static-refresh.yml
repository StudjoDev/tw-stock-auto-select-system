name: Refresh Static Screening Site

on:
  schedule:
    # 05:00 UTC = 13:00 Asia/Taipei (daily close to market close setup)
    - cron: "0 5 * * 1-5"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: gh-pages-static-refresh
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .["dev"]

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate daily static dataset
        working-directory: .
        run: python scripts/generate-static-feed.py
        env:
          MARKET_DATA_PROVIDER: ${{ vars.MARKET_DATA_PROVIDER || 'mock' }}

      - name: Build static site
        working-directory: frontend
        env:
          NEXT_PUBLIC_STATIC_DATA: "1"
          NEXT_PUBLIC_API_BASE_URL: ""
          NEXT_PUBLIC_BASE_PATH: "/${{ github.event.repository.name }}"
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
